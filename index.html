<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagna & Vantheav - Wedding Invitation</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for compiling React Code in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Custom Khmer Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&family=Moul&display=swap');
      .font-khmer-title { font-family: 'Moul', serif; font-weight: normal; line-height: 1.8; }
      .font-khmer-body { font-family: 'Hanuman', serif; line-height: 1.6; }
      html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-[#fcf8f2] font-sans text-gray-800 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // --- SVG Icons ---
      const IconChevronDown = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>);
      const IconHeart = ({ className, fill }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill={fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>);
      const IconCalendar = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>);
      const IconClock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>);
      const IconMapPin = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>);
      const IconCreditCard = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>);
      const IconCamera = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>);

      // --- Countdown Component ---
      const CountdownTimer = ({ targetDate }) => {
        const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

        useEffect(() => {
          const timer = setInterval(() => {
            const now = new Date().getTime();
            const distance = new Date(targetDate).getTime() - now;

            if (distance < 0) {
              clearInterval(timer);
            } else {
              setTimeLeft({
                days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                seconds: Math.floor((distance % (1000 * 60)) / 1000),
              });
            }
          }, 1000);
          return () => clearInterval(timer);
        }, [targetDate]);

        const TimeUnit = ({ value, label, labelEn }) => (
          <div className="flex flex-col items-center bg-white/10 border border-[#DEBC77]/30 rounded-xl p-3 min-w-[70px] md:min-w-[90px]">
            <span className="text-2xl md:text-3xl font-bold text-[#DEBC77]">{value}</span>
            <span className="text-[10px] md:text-xs text-white/80">{label}</span>
            <span className="text-[8px] md:text-[10px] uppercase tracking-tighter opacity-60 text-white">{labelEn}</span>
          </div>
        );

        return (
          <div className="flex justify-center gap-2 md:gap-4 mt-8">
            <TimeUnit value={timeLeft.days} label="ថ្ងៃ" labelEn="Days" />
            <TimeUnit value={timeLeft.hours} label="ម៉ោង" labelEn="Hours" />
            <TimeUnit value={timeLeft.minutes} label="នាទី" labelEn="Minutes" />
            <TimeUnit value={timeLeft.seconds} label="វិនាទី" labelEn="Seconds" />
          </div>
        );
      };

      // --- Main Application ---
      function App() {
        const [guestName, setGuestName] = useState('ភ្ញៀវកិត្តិយស / Honored Guest');
        const [isOpened, setIsOpened] = useState(false);
        const contentRef = useRef(null);

        // --- Gallery Photos ---
        const galleryPhotos = [
          "photo1.jpg",
          "photo2.jpg",
          "photo3.jpg",
          "photo4.jpg",
          "photo5.jpg",
          "photo6.jpg"
        ];

        useEffect(() => {
          const params = new URLSearchParams(window.location.search);
          const name = params.get('guest');
          if (name) {
            setGuestName(name);
          }
        }, []);

        const openInvitation = () => {
          setIsOpened(true);
          setTimeout(() => {
            contentRef.current?.scrollIntoView({ behavior: 'smooth' });
          }, 100);
        };

        return (
          <div className="min-h-screen font-khmer-body">
            {/* --- ENTRANCE PAGE (COVER) --- */}
            <div className="relative min-h-screen flex flex-col items-center justify-center bg-[#4B5A3A] text-[#DEBC77] overflow-hidden p-4">
              
              <div className="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none">
                <svg className="absolute top-0 left-0 w-64 h-64 -translate-x-12 -translate-y-12" viewBox="0 0 100 100">
                  <path d="M50 0 C60 20, 80 40, 100 50 C80 60, 60 80, 50 100 C40 80, 20 60, 0 50 C20 40, 40 20, 50 0 Z" fill="currentColor"/>
                </svg>
                <svg className="absolute bottom-0 right-0 w-64 h-64 translate-x-12 translate-y-12" viewBox="0 0 100 100">
                  <path d="M50 0 C60 20, 80 40, 100 50 C80 60, 60 80, 50 100 C40 80, 20 60, 0 50 C20 40, 40 20, 50 0 Z" fill="currentColor"/>
                </svg>
              </div>

              <div className="z-10 flex flex-col items-center text-center max-w-lg w-full p-8 border border-[#DEBC77]/40 rounded-3xl bg-[#4B5A3A] shadow-2xl">
                <img 
                  src="image_5512e0.png" 
                  alt="Wedding Crest" 
                  className="w-56 md:w-64 mb-6 mix-blend-lighten" 
                />
                <h2 className="text-xl md:text-4xl mb-2 text-[#DEBC77] font-khmer-title">លិខិតអញ្ជើញ</h2>
                <h2 className="text-2xl md:text-xl mb-10 tracking-widest uppercase font-serif">Wedding Invitation</h2>
                <h2 className="text-xl md:text-3xl mb-2 text-[#DEBC77] font-khmer-title">បញ្ញា និង វ៉ាន់ធាវ</h2>
                <h1 className="text-2xl md:text-2xl font-bold mb-6 font-serif">Pagna & Vantheav</h1>
                
                <div className="w-16 h-px bg-[#DEBC77]/60 my-6"></div>
                
                <div className="mb-8">
                  <p className="text-sm md:text-base text-[#DEBC77]/80 mb-2">ជូនចំពោះ / To</p>
                  <p className="text-2xl md:text-3xl px-4 py-2 border-b-2 border-[#DEBC77] border-dashed font-khmer-title text-[#DEBC77]">
                    {guestName}
                  </p>
                </div>

                <button 
                  onClick={openInvitation}
                  className="group relative px-8 py-4 bg-[#DEBC77] text-[#4B5A3A] font-bold rounded-full text-lg shadow-lg hover:bg-[#ebd095] transition-all duration-300 flex items-center justify-center gap-2"
                >
                  <span>Open The Invitation</span>
                  <IconChevronDown className={`w-5 h-5 transition-transform duration-500 ${isOpened ? 'rotate-180' : 'animate-bounce'}`} />
                </button>
              </div>
            </div>

            {/* --- INVITATION CONTENT --- */}
            <div ref={contentRef} className="min-h-screen py-20 px-4 sm:px-6 lg:px-8">
              <div className="max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-[#DEBC77]/20">
                
                {/* Parents & Couple Section */}
                <div className="p-8 md:p-12 text-center bg-[#4B5A3A] text-white">
                  <h2 className="text-3xl md:text-4xl mb-10 text-[#DEBC77] font-khmer-title">សិរីមង្គលអាពាហ៍ពិពាហ៍</h2>
                  
                  <div className="flex flex-col md:flex-row justify-around items-center gap-8 mb-12">
                    <div className="text-center">
                      <p className="text-[#DEBC77] text-xl mb-2">មាតាបិតាខាងកូនប្រុស</p>
                      <p className="font-semibold text-xl text-lg">លោក កាន់ បុណ្ណសារី</p>
                      <p className="font-semibold text-xl text-lg">លោកស្រី កេត កញ្ញា</p>
                    </div>
                    
                    <div className="hidden md:block w-px h-24 bg-[#DEBC77]/40"></div>
                    
                    <div className="text-center">
                      <p className="text-[#DEBC77] text-xl mb-2">មាតាបិតាខាងកូនស្រី</p>
                      <p className="font-semibold text-xl text-lg">លោក សៀន ឆេងកូ</p>
                      <p className="font-semibold text-xl text-lg">លោកស្រី ឈាត វ៉ាន់ធីវ</p>
                    </div>
                  </div>
                    
                  <p className="text-[#DEBC77] text-l mb-8 text-lg">សូមគោរពអញ្ជើញចូលរួមជាអធិបតី និងភ្ញៀវកិត្តិយសក្នុងពិធីរៀបអាពាហ៍ពិពាហ៍</p>

                  <div className="flex flex-col items-center justify-center gap-4 my-10">
                    <div className="text-center">
                      <p className="text-[#DEBC77] mb-1">កូនប្រុសនាម / Groom</p>
                      <h3 className="text-2xl md:text-4xl font-khmer-title text-[#DEBC77] mt-2 mb-2">កាន់ បុណ្ណបញ្ញា</h3>
                      <p className="mt-2 text-lg md:text-xl font-serif text-[#DEBC77]">KANN Bonpagna</p>
                    </div>
                    
                    <IconHeart className="w-10 h-10 md:w-12 md:h-12 text-[#DEBC77] animate-pulse my-4" fill="currentColor" />
                    
                    <div className="text-center">
                      <p className="text-[#DEBC77] mb-1">កូនស្រីនាម / Bride</p>
                      <h3 className="text-2xl md:text-4xl font-khmer-title text-[#DEBC77] mt-2 mb-2">សៀន វ៉ាន់ធាវ</h3>
                      <p className="mt-2 text-lg md:text-xl font-serif text-[#DEBC77]">SEAN Vantheav</p>
                    </div>
                  </div>
                  
                  {/* --- NEW COUNTDOWN SECTION --- */}
                  <div className="border-t border-[#DEBC77]/20 pt-10">
                    <h4 className="text-[#DEBC77] font-serif uppercase tracking-[0.2em] text-sm">Counting down to the big day</h4>
                    <CountdownTimer targetDate="2026-04-19T17:00:00" />
                  </div>

                </div>

                {/* Time & Location Details */}
                <div className="p-8 md:p-12 text-center border-b border-[#DEBC77]/20">
                   <h2 className="text-2xl md:text-3xl text-[#4B5A3A] mb-6 font-khmer-title">កាលបរិច្ឆេទ និង ទីកន្លែង</h2>
                   
                   <div className="flex flex-col items-center justify-center gap-4 mb-8">
                     <div className="flex items-center justify-center gap-3 text-xl font-semibold text-gray-800">
                       <IconCalendar className="text-[#4B5A3A] w-6 h-6" />
                       ថ្ងៃអាទិត្យ ទី១៩ ខែមេសា ឆ្នាំ២០២៦
                     </div>
                     <div className="text-gray-600 font-serif">
                       Sunday 19th April 2026
                     </div>
                   </div>

                   <div className="flex flex-col items-center justify-center gap-4">
                     <div className="flex items-center justify-center gap-3 text-xl font-semibold text-gray-800">
                       <IconClock className="text-[#4B5A3A] w-6 h-6" />
                       វេលាម៉ោង ៥:០០ ល្ងាច
                     </div>
                     <div className="text-gray-600 font-serif mb-6">
                       At 5:30 PM
                     </div>

                     <div className="flex items-center justify-center gap-3 text-lg font-semibold text-gray-800 max-w-lg text-center">
                       <IconMapPin className="text-[#4B5A3A] w-8 h-8 flex-shrink-0" />
                       នៅ គេហដ្ឋានខាងស្រី ស្ថិតនៅ ភូមិសាន់គ(ក) ឃុំសាន់គ ស្រុកកំពង់ស្វាយ ខេត្តកំពង់ធំ
                     </div>
                     <div className="text-gray-600 font-serif text-center max-w-lg">
                       At the Bride's Residence, Sankor Village, Sankor Commune, Kampong Svay District, Kampong Thom Province.
                     </div>
                   </div>
                </div>

                {/* Program Schedule (Timeline Style) */}
                <div className="p-8 md:p-12 bg-[#f9f5ed] border-b border-[#DEBC77]/20">
                  <h2 className="text-2xl md:text-3xl text-[#4B5A3A] mb-10 text-center font-khmer-title">កម្មវិធីអាពាហ៍ពិពាហ៍</h2>
                  
                  <div className="flex flex-col gap-10 max-w-3xl mx-auto">
                    
                    {/* Day 1 */}
                    <div className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-[#DEBC77]/30">
                      <h3 className="font-bold text-[#4B5A3A] text-lg md:text-xl mb-8 font-khmer-title text-center md:text-left text-[#DEBC77] border-b border-[#DEBC77]/20 pb-4">
                        កម្មវិធីថ្ងៃទី១ ៖ ថ្ងៃសៅរ៍ ទី១៨ ខែមេសា ឆ្នាំ២០២៦
                      </h3>
                      
                      <div className="space-y-6 md:space-y-8 pl-4 border-l-2 border-[#DEBC77]/40 ml-2 md:ml-4">
                        <div className="relative">
                          <div className="absolute w-3 h-3 rounded-full bg-[#DEBC77] -left-[23px] top-1.5 shadow-[0_0_0_4px_white]"></div>
                          <div className="flex flex-col md:flex-row md:gap-6 w-full">
                            <span className="font-semibold text-[#4B5A3A] shrink-0 md:w-40">ម៉ោង ០១:៣៥ រសៀល</span>
                            <span className="text-gray-700">ជួបជុំភ្ញៀវកិត្តិយសនៅរោងជ័យ</span>
                          </div>
                        </div>

                        <div className="relative">
                          <div className="absolute w-3 h-3 rounded-full bg-[#DEBC77] -left-[23px] top-1.5 shadow-[0_0_0_4px_white]"></div>
                          <div className="flex flex-col md:flex-row md:gap-6 w-full">
                            <span className="font-semibold text-[#4B5A3A] shrink-0 md:w-40">ម៉ោង ០២:០៧ រសៀល</span>
                            <span className="text-gray-700">ពិធីសែនក្រុងពាលី</span>
                          </div>
                        </div>

                        <div className="relative">
                          <div className="absolute w-3 h-3 rounded-full bg-[#DEBC77] -left-[23px] top-1.5 shadow-[0_0_0_4px_white]"></div>
                          <div className="flex flex-col md:flex-row md:gap-6 w-full">
                            <span className="font-semibold text-[#4B5A3A] shrink-0 md:w-40">ម៉ោង ០៣:០៦ រសៀល</span>
                            <span className="text-gray-700">ពិធីសូត្រមន្តចម្រើនព្រះបរិត្ត</span>
                          </div>
                        </div>

                        <div className="relative">
                          <div className="absolute w-3 h-3 rounded-full bg-[#DEBC77] -left-[23px] top-1.5 shadow-[0_0_0_4px_white]"></div>
                          <div className="flex flex-col md:flex-row md:gap-6 w-full">
                            <span className="font-semibold text-[#4B5A3A] shrink-0 md:w-40">ម៉ោង ០៤:០៥ រសៀល</span>
                            <span className="text-gray-700">ពិធីចាវខាន់ស្លា</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Day 2 */}
                    <div className="bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-[#DEBC77]/30">
                      <h3 className="font-bold text-[#4B5A3A] text-lg md:text-xl mb-8 font-khmer-title text-center md:text-left text-[#DEBC77] border-b border-[#DEBC77]/20 pb-4">
                        កម្មវិធីថ្ងៃទី២ ៖ ថ្ងៃអាទិត្យ ទី១៩ ខែមេសា ឆ្នាំ២០២៦
                      </h3>
                      
                      <div className="space-y-6 md:space-y-8 pl-4 border-l-2 border-[#DEBC77]/40 ml-2 md:ml-4">
                        <div className="relative">
                          <div className="absolute w-3 h-3 rounded-full bg-[#DEBC77] -left-[23px] top-1.5 shadow-[0_0_0_4px_white]"></div>
                          <div className="flex flex-col md:flex-row md:gap-6 w-full">
                            <span className="font-semibold text-[#4B5A3A] shrink-0 md:w-40">ម៉ោង ០៦:៣០ នាទីព្រឹក</span>
                            <span className="text-gray-700">ជួបជុំបងប្អូន និងភ្ញៀវកិត្តិយសរៀបចំហែជំនូន</span>
                          </div>
                        </div>

                        <div className="relative">
                          <div className="absolute w-3 h-3 rounded-full bg-[#DEBC77] -left-[23px] top-1.5 shadow-[0_0_0_4px_white]"></div>
                          <div className="flex flex-col md:flex-row md:gap-6 w-full">
                            <span className="font-semibold text-[#4B5A3A] shrink-0 md:w-40">ម៉ោង ០៧:០២ នាទីព្រឹក</span>
                            <span className="text-gray-700">ពិធីហែជំនូន កំណត់ចូលរោងជ័យ</span>
                          </div>
                        </div>

                        <div className="relative">
                          <div className="absolute w-3 h-3 rounded-full bg-[#DEBC77] -left-[23px] top-1.5 shadow-[0_0_0_4px_white]"></div>
                          <div className="flex flex-col md:flex-row md:gap-6 w-full">
                            <span className="font-semibold text-[#4B5A3A] shrink-0 md:w-40">ម៉ោង ០៧:២០ នាទីព្រឹក</span>
                            <span className="text-gray-700">ពិធីថៅមហានិយាយរឿងការ រៀបរាប់ផ្លែឈើ</span>
                          </div>
                        </div>

                        <div className="relative">
                          <div className="absolute w-3 h-3 rounded-full bg-[#DEBC77] -left-[23px] top-1.5 shadow-[0_0_0_4px_white]"></div>
                          <div className="flex flex-col md:flex-row md:gap-6 w-full">

                            <span className="text-gray-700">ពិធីកាត់សក់បង្កក់សិរី កូនប្រុស-កូនស្រី</span>

                        <div className="relative">

                              <span className="text-gray-500">ភោជនាហារថ្ងៃត្រង់</span>

                <div className="p-8 md:p-12 text-center border-b border-[#DEBC77]/20 bg-[#f9f5ed]">

                  </h2>

                      <div key={index} className="aspect-square overflow-hidden rounded-2xl border border-[#DEBC77]/30 shadow-sm bg-[#fcf8f2] flex items-center justify-center relative group">
                        {/* The image tag expects files like photo1.jpg in the same folder */}
                        <img 
                          src={photo} 
                          alt={`Gallery photo ${index + 1}`} 
                          className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 relative z-10"
                          onError={(e) => {
                            // Fallback if image not found: hide image, show instructions
                            e.target.style.display = 'none';
                            e.target.nextElementSibling.style.display = 'flex';
                          }}
                        />
                        {/* Placeholder UI shown only if image fails to load */}
                        <div className="fallback-msg absolute inset-0 hidden flex-col items-center justify-center text-center p-4 text-[#4B5A3A]/60 z-0">
                          <IconCamera className="w-8 h-8 mb-2 opacity-40" />
                          <span className="text-xs font-sans">Save image as <br/><b className="text-[#4B5A3A]">{photo}</b></span>

                        <a

                        </a>
                      </div>
                    </div>

                    {/* Right Box: Wedding Gift */}
                    <div className="flex-1 flex flex-col bg-[#4B5A3A] text-white rounded-3xl shadow-xl border-4 border-[#DEBC77]/20 p-6 md:p-8">
                      <div className="flex flex-col items-center mb-6">
                        <IconCreditCard className="w-10 h-10 text-[#DEBC77] mb-2" />
                        <h3 className="text-xl md:text-2xl font-khmer-title text-[#DEBC77]">ចំណងដៃ / Wedding Gift</h3>
                      </div>

                      <div className="grid grid-cols-2 gap-4 flex-1 items-center">
                        {/* USD Column */}
                        <div className="flex flex-col gap-3">
                          <div className="bg-white rounded-xl p-2 aspect-square flex items-center justify-center overflow-hidden">
                            <img src="QR.png" className="max-w-full max-h-full object-contain" />
                          </div>
                          <a 
                            href="https://pay.ababank.com/oRF8/cb4ycwft" 
                            className="py-3 bg-[#DEBC77] text-[#4B5A3A] rounded-xl font-bold text-sm md:text-base text-center hover:opacity-90 transition-opacity"

                        {/* Riels Column */}
                        <div className="flex flex-col gap-3">
                          <div className="bg-white rounded-xl p-2 aspect-square flex items-center justify-center overflow-hidden">
                            <img src="QR.png" className="max-w-full max-h-full object-contain" />
                          </div>
                          <a 
                            href="https://pay.ababank.com/oRF8/9m65l95l" 
                            className="py-3 bg-[#DEBC77] text-[#4B5A3A] rounded-xl font-bold text-sm md:text-base text-center hover:opacity-90 transition-opacity"
                          >
                            ABA Riels (៛)
                          </a>
                        </div>
                      </div>
                      
                      <p className="text-sm text-white-500">
                        សូមស្កេនឬចុចប៊ូតុងដើម្បីបើកកម្មវិធី 
                      </p>
                    </div>

                  </div>
                </div>

              </div>

      // Render the App
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
